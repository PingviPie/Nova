<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f0f11;
      --surface: #18181c;
      --border:  rgba(255,255,255,0.08);
      --text:    #f0eee8;
      --muted:   #888;
      --accent:  #7F77DD;
      --accent2: #534AB7;
      --green:   #63C921;
      --red:     #E24B4A;
      --amber:   #EF9F27;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.25rem 0; flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 10px; padding: 0 1.25rem 1.25rem; border-bottom: 1px solid var(--border); }
    .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; }
    .logo-icon i { font-size: 18px; color: #fff; }
    .logo-name { font-size: 16px; font-weight: 600; }
    .logo-ver  { font-size: 11px; color: var(--muted); }
    .nav { padding: 1rem 0.75rem; flex: 1; }
    .nav-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 0 0.5rem; margin-bottom: 6px; margin-top: 14px; }
    .nav-label:first-child { margin-top: 0; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 7px; font-size: 13.5px; color: var(--muted); cursor: pointer; transition: all 0.15s; user-select: none; }
    .nav-item:hover  { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: rgba(127,119,221,0.15); color: var(--accent); }
    .nav-item i { font-size: 17px; }
    .nav-badge { margin-left: auto; font-size: 11px; background: var(--accent2); color: #fff; padding: 1px 7px; border-radius: 99px; }
    .sidebar-footer { padding: 1rem 1.25rem 0; border-top: 1px solid var(--border); }
    .user-row { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #E24B4A, #EF9F27); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; }
    .user-name { font-size: 13px; font-weight: 500; }
    .user-plan { font-size: 11px; color: var(--muted); }

    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { height: 54px; padding: 0 1.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .topbar-title { font-size: 15px; font-weight: 600; flex: 1; }
    .topbar-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 7px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: var(--text); transition: all 0.15s; font-family: inherit; }
    .topbar-btn:hover { background: rgba(255,255,255,0.08); }
    .topbar-btn.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
    .topbar-btn.primary:hover { background: var(--accent); border-color: var(--accent); }
    .content { flex: 1; overflow-y: auto; padding: 1.75rem; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.75rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem; }
    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat-val   { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
    .stat-change { font-size: 11px; margin-top: 4px; color: var(--green); }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-title { font-size: 14px; font-weight: 500; }
    .view-all { font-size: 12px; color: var(--accent); cursor: pointer; }

    .notes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.75rem; }
    .note-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; cursor: pointer; transition: all 0.15s; position: relative; }
    .note-card:hover { border-color: rgba(127,119,221,0.4); transform: translateY(-1px); }
    .note-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 10px; }
    .note-title   { font-size: 13.5px; font-weight: 500; margin-bottom: 6px; }
    .note-preview { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .note-date    { font-size: 11px; color: var(--muted); margin-top: 12px; }
    .note-delete  { position: absolute; top: 8px; right: 8px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.15s; padding: 2px; }
    .note-card:hover .note-delete { opacity: 1; }
    .note-delete:hover { color: var(--red); }

    .tasks-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .task-item:last-child { border-bottom: none; padding-bottom: 0; }
    .task-item:first-child { padding-top: 0; }
    .task-cb { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .task-item.done .task-cb { background: var(--accent2); border-color: var(--accent2); }
    .task-item.done .task-cb i { font-size: 12px; color: #fff; }
    .task-text { font-size: 13.5px; flex: 1; }
    .task-item.done .task-text { color: var(--muted); text-decoration: line-through; }
    .task-tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; border: 1px solid var(--border); }
    .tag-design { color: #7F77DD; border-color: rgba(127,119,221,0.3); }
    .tag-code   { color: var(--green); border-color: rgba(99,201,33,0.3); }
    .tag-review { color: var(--amber); border-color: rgba(239,159,39,0.3); }
    .tag-bug    { color: var(--red);   border-color: rgba(226,75,74,0.3); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 420px; }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
    .modal input, .modal textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; color: var(--text); font-family: inherit; font-size: 13.5px; outline: none; margin-bottom: 10px; }
    .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
    .modal textarea { resize: none; height: 100px; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .modal-footer button { padding: 7px 16px; border-radius: 7px; font-size: 13px; cursor: pointer; font-family: inherit; }
    .btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); }
    .btn-save   { background: var(--accent2); border: none; color: #fff; }
    .btn-cancel:hover { background: rgba(255,255,255,0.05); }
    .btn-save:hover   { background: var(--accent); }

    .loader { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-size: 14px; gap: 10px; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-planet"></i></div>
    <div><div class="logo-name">Nova</div><div class="logo-ver">v3.1.0</div></div>
  </div>
  <nav class="nav">
    <div class="nav-label">Workspace</div>
    <div class="nav-item active" onclick="setPage('dashboard', this)"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
    <div class="nav-item" onclick="setPage('notes', this)"><i class="ti ti-notes"></i> Notes <span class="nav-badge" id="notes-count">0</span></div>
    <div class="nav-item" onclick="setPage('tasks', this)"><i class="ti ti-checkbox"></i> Tasks</div>
    <div class="nav-label">Tools</div>
    <div class="nav-item" onclick="setPage('other', this)"><i class="ti ti-calendar"></i> Calendar</div>
    <div class="nav-item" onclick="setPage('other', this)"><i class="ti ti-folder"></i> Files</div>
    <div class="nav-item" onclick="setPage('other', this)"><i class="ti ti-settings"></i> Settings</div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="avatar">A</div>
      <div><div class="user-name">Alex</div><div class="user-plan">Pro plan</div></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">Dashboard</span>
    <button class="topbar-btn primary" onclick="openModal()"><i class="ti ti-plus" style="font-size:15px;"></i> New note</button>
  </div>
  <div class="content" id="content">
    <div class="loader"><i class="ti ti-loader-2" style="font-size:20px;"></i> Loading...</div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">New note</div>
    <input id="note-title-input" type="text" placeholder="Title..." />
    <textarea id="note-body-input" placeholder="Write something..."></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveNote()">Save note</button>
    </div>
  </div>
</div>

<script>
  let notes       = [];
  let tasks       = [];
  let currentPage = 'dashboard';

  // ── API: запросы к серверу ─────────────────────────────────────────
  const api = {
    getNotes:   ()     => fetch('/api/notes').then(r => r.json()),
    createNote: (data) => fetch('/api/notes', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) }).then(r => r.json()),
    deleteNote: (id)   => fetch(`/api/notes/${id}`, { method: 'DELETE' }).then(r => r.json()),
    getTasks:   ()     => fetch('/api/tasks').then(r => r.json()),
    toggleTask: (id)   => fetch(`/api/tasks/${id}`, { method: 'PATCH' }).then(r => r.json()),
  };

  // ── Загружаем данные при старте ────────────────────────────────────
  async function loadAll() {
    [notes, tasks] = await Promise.all([api.getNotes(), api.getTasks()]);
    document.getElementById('notes-count').textContent = notes.length;
    renderPage();
  }

  // ── Навигация ──────────────────────────────────────────────────────
  function setPage(page, el) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    currentPage = page;
    document.getElementById('topbar-title').textContent = el.textContent.trim().replace(/\d+/,'').trim();
    renderPage();
  }

  function renderPage() {
    const c = document.getElementById('content');
    if      (currentPage === 'dashboard') renderDashboard(c);
    else if (currentPage === 'notes')     renderNotes(c);
    else if (currentPage === 'tasks')     renderTasks(c);
    else c.innerHTML = `<div class="loader"><i class="ti ti-tools" style="font-size:20px;"></i> Coming soon</div>`;
  }

  // ── Страницы ───────────────────────────────────────────────────────
  function renderDashboard(c) {
    const done = tasks.filter(t => t.done).length;
    c.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Notes</div><div class="stat-val">${notes.length}</div><div class="stat-change">↑ saved to server</div></div>
        <div class="stat-card"><div class="stat-label">Tasks done</div><div class="stat-val">${done}/${tasks.length}</div><div class="stat-change">↑ on track</div></div>
        <div class="stat-card"><div class="stat-label">Storage used</div><div class="stat-val">2.1 GB</div><div class="stat-change" style="color:var(--muted)">of 10 GB</div></div>
        <div class="stat-card"><div class="stat-label">Streak</div><div class="stat-val">7 🔥</div><div class="stat-change">Best: 14 days</div></div>
      </div>
      <div class="section-header">
        <div class="section-title">Recent notes</div>
        <div class="view-all" onclick="document.querySelectorAll('.nav-item')[1].click()">View all →</div>
      </div>
      <div class="notes-grid">${notes.slice(0,3).map(noteHTML).join('')}</div>
      <div class="section-header">
        <div class="section-title">Tasks</div>
        <div class="view-all" onclick="document.querySelectorAll('.nav-item')[2].click()">View all →</div>
      </div>
      <div class="tasks-section">${tasks.map(taskHTML).join('')}</div>
    `;
    bindNoteDeletes();
    bindTaskToggles();
  }

  function renderNotes(c) {
    c.innerHTML = `
      <div class="section-header"><div class="section-title">${notes.length} notes</div></div>
      <div class="notes-grid">${notes.map(noteHTML).join('')}</div>
    `;
    bindNoteDeletes();
  }

  function renderTasks(c) {
    c.innerHTML = `<div class="tasks-section">${tasks.map(taskHTML).join('')}</div>`;
    bindTaskToggles();
  }

  // ── HTML шаблоны ───────────────────────────────────────────────────
  function noteHTML(n) {
    return `<div class="note-card">
      <button class="note-delete" data-id="${n.id}" title="Delete"><i class="ti ti-x"></i></button>
      <div class="note-dot" style="background:${n.color}"></div>
      <div class="note-title">${n.title}</div>
      <div class="note-preview">${n.body}</div>
      <div class="note-date">${n.date}</div>
    </div>`;
  }

  function taskHTML(t) {
    return `<div class="task-item ${t.done ? 'done' : ''}" data-id="${t.id}">
      <div class="task-cb">${t.done ? '<i class="ti ti-check"></i>' : ''}</div>
      <div class="task-text">${t.text}</div>
      <div class="task-tag tag-${t.tag}">${t.tag}</div>
    </div>`;
  }

  // ── Обработчики событий ────────────────────────────────────────────
  function bindNoteDeletes() {
    document.querySelectorAll('.note-delete').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = parseInt(btn.dataset.id);
        await api.deleteNote(id);                           // удаляем на сервере
        notes = notes.filter(n => n.id !== id);             // обновляем локально
        document.getElementById('notes-count').textContent = notes.length;
        renderPage();
      });
    });
  }

  function bindTaskToggles() {
    document.querySelectorAll('.task-item').forEach(el => {
      el.addEventListener('click', async () => {
        const id      = parseInt(el.dataset.id);
        const updated = await api.toggleTask(id);           // togglem на сервере
        const task    = tasks.find(t => t.id === id);
        if (task) task.done = updated.done;
        renderPage();
      });
    });
  }

  // ── Модалка ────────────────────────────────────────────────────────
  function openModal() {
    document.getElementById('modal').classList.add('open');
    document.getElementById('note-title-input').focus();
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('note-title-input').value = '';
      document.getElementById('note-body-input').value  = '';
    }
  }

  async function saveNote() {
    const title = document.getElementById('note-title-input').value.trim();
    const body  = document.getElementById('note-body-input').value.trim();
    if (!title) return; 

    const newNote = await api.createNote({ title, body }); // сохраняем на сервере
    notes.unshift(newNote);
    document.getElementById('notes-count').textContent = notes.length;
    closeModal();
    renderPage();
  }

  // ── Старт ──────────────────────────────────────────────────────────
  loadAll();
</script>
</body>
</html>
